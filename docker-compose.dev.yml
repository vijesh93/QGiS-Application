services:
  backend:
    build:
      context: ./backend
      args:
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
        NO_PROXY: ${NO_PROXY}
    volumes:
      # Bind-mount the backend source so edits inside container reflect on host
      - ./backend:/app
      # Optionally keep a container-only venv or cache (avoids overwriting by host)
      - /app/.venv
    ports:
      - "${BACKEND_HOST_PORT}:8000"
    container_name: qgis-raster-app-geoportal-backend
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD_URL}@db:5432/geoportal
      HTTP_PROXY: ${HTTP_PROXY}
      HTTPS_PROXY: ${HTTPS_PROXY}
      NO_PROXY: ${NO_PROXY}
    command: uvicorn main:app --host 0.0.0.0 --reload # Enables hot-reload
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
        NO_PROXY: ${NO_PROXY}
    volumes:
      # Bind-mount the frontend source so edits inside container reflect on host
      - ./frontend:/app
      # Persist container-installed node_modules (don't override with host)
      - /app/node_modules
    ports:
      - "${FRONTEND_HOST_PORT}:5173"
    container_name: geoportal-frontend
    environment:
      HTTP_PROXY: ${HTTP_PROXY}
      HTTPS_PROXY: ${HTTPS_PROXY}
      NO_PROXY: ${NO_PROXY}
      VITE_TITILER_URL: ${VITE_TITILER_URL}
      VITE_API_URL: ${VITE_API_URL}
    networks:
      - gis-network 
  
  data-loader:
    build:
      context: ./data
      args:
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
        NO_PROXY: ${NO_PROXY}
    volumes:
      - ./data:/app
      - ./backend:/backend_src # Optional: to share models
    container_name: geoportal-data-loader
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD_URL}@db:5432/geoportal
      HTTP_PROXY: ${HTTP_PROXY}
      HTTPS_PROXY: ${HTTPS_PROXY}
      NO_PROXY: ${NO_PROXY}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_PASSWORD_URL: ${DB_PASSWORD_URL}
    restart: on-failure  # This restarts the service automatically
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gis-network
    tty: true

networks:
  gis-network:
  